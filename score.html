  <body>
    <div>
      <table>
        <thead>
          <tr>
            <th style="width: 5%">ID</th>
            <th style="width: 30%">Name</th>
            <th style="width: 15;">Midterm</th>
            <th style="width: 15;">Final</th>
            <th style="width: 15;">Total</th>
            <th style="width: 15;">Grade</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <script>
      $(document).ready(function () {
        
        function getGrade(total) {
          if (total >= 80 && total <= 100) return 'A';
          if (total >= 70 && total <= 79) return 'B';
          if (total >= 60 && total <= 69) return 'C';
          if (total >= 50 && total <= 59) return 'D';
          return 'F';
        }

        function renderTable() {
          const $tbody = $('#table-body');
          $tbody.empty();

          students.forEach(function (student, index) {
            const total = Number(student.midterm) + Number(student.final);
            const grade = getGrade(total);

            const row = `
              <tr data-index="${index}">
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td class="editable" data-field="midterm">${student.midterm}</td>
                <td class="editable" data-field="final">${student.final}</td>
                <td class="total-cell">${total}</td>
                <td class="grade-cell">${grade}</td>
              </tr>
            `;
            $tbody.append(row);
          });
        }

        renderTable();

        $('#table-body').on('click', '.editable', function () {
          const $cell = $(this);
          
          if ($cell.find('input').length > 0) return;

          const currentVal = $cell.text();
          
          const $input = $('<input>', {
            type: 'number',
            class: 'edit-input',
            val: currentVal,
            min: 0,
            max: 50
          });

          $cell.data('original-val', currentVal);
          
          $cell.html($input);
          $input.focus().select();
        });

        $('#table-body').on('keydown blur', '.edit-input', function (e) {
          const $input = $(this);
          const $cell = $input.closest('td');
          const rowIndex = $cell.closest('tr').data('index');
          const field = $cell.data('field');
          const originalVal = Number($cell.data('original-val'));

          if (e.type === 'keydown') {
            if (e.key === 'Enter') {
              processSave($input, $cell, rowIndex, field, originalVal);
            } else if (e.key === 'Escape') {
              $cell.html(originalVal);
            }
          } 
          else if (e.type === 'focusout' || e.type === 'blur') {
            if ($.contains(document, $input[0])) {
              processSave($input, $cell, rowIndex, field, originalVal);
            }
          }
        });

        function processSave($input, $cell, rowIndex, field, originalVal) {
          const inputValStr = $input.val();
          const newVal = Number(inputValStr);

          if (inputValStr === '' || isNaN(newVal) || newVal < 0 || newVal > 50) {
            alert('Invalid score! Scores must be a valid number between 0 and 50.');
            $cell.html(originalVal);
            return;
          }

          students[rowIndex][field] = newVal;
          $cell.html(newVal);

          const currentStudent = students[rowIndex];
          const newTotal = Number(currentStudent.midterm) + Number(currentStudent.final);
          const newGrade = getGrade(newTotal);

          const $row = $cell.closest('tr');
          $row.find('.total-cell').text(newTotal);
          $row.find('.grade-cell').text(newGrade);
        }

      });
    </script>
  </body>
